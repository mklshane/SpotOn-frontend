<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="loc-body" x1="200" y1="70" x2="200" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE3CE"/>
      <stop offset="1" stop-color="#FFC29C"/>
    </linearGradient>
    <linearGradient id="loc-mark" x1="216" y1="160" x2="244" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA468"/>
      <stop offset="1" stop-color="#F26A2E"/>
    </linearGradient>
    <radialGradient id="loc-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(232 176) scale(44)">
