<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="derm-pin" x1="150" y1="84" x2="250" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA468"/>
      <stop offset="0.55" stop-color="#FF8A4C"/>
      <stop offset="1" stop-color="#F26A2E"/>
    </linearGradient>
    <linearGradient id="derm-face" x1="166" y1="120" x2="234" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D79A6E"/>
      <stop offset="1" stop-color="#BE7E4F"/>
    </linearGradient>
    <filter id="derm-shadow" x="120" y="74" width="160" height="260" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#211A15" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- faint map contours -->
  <g stroke="#FFC3AC" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7">
    <path d="M70 120 q40 -26 84 -6 q44 20 84 -2"/>
    <path d="M84 300 q44 22 96 6 q52 -16 104 6"/>
    <path d="M300 150 q22 30 6 70"/>
    <path d="M96 188 q-18 28 0 58"/>
  </g>
  <g fill="#FFD7C0" opacity="0.6">
    <circle cx="92" cy="150" r="5"/>
    <circle cx="312" cy="288" r="5"/>
  </g>

  <!-- ground shadow -->
  <ellipse cx="200" cy="332" rx="58" ry="12" fill="#211A15" opacity="0.1"/>

  <!-- location pin -->
  <g filter="url(#derm-shadow)">
    <path d="M200 84 c-43 0 -78 34 -78 77 c0 53 60 105 75 137 c1.4 3 4.6 3 6 0 c15 -32 75 -84 75 -137 c0 -43 -35 -77 -78 -77 z" fill="url(#derm-pin)"/>
    <!-- soft highlight on the pin -->
    <path d="M168 108 c-18 12 -28 32 -28 54" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.28"/>

    <!-- doctor avatar inset -->
    <circle cx="200" cy="154" r="50" fill="#FFF9F4"/>
    <clipPath id="derm-clip"><circle cx="200" cy="154" r="50"/></clipPath>
    <g clip-path="url(#derm-clip)">
      <!-- backdrop with soft top light -->
      <rect x="150" y="104" width="100" height="100" fill="#FFF1E8"/>
      <ellipse cx="200" cy="120" rx="56" ry="34" fill="#FFFFFF" opacity="0.7"/>

      <!-- white coat / shoulders -->
      <path d="M150 204 v-6 c0 -22 22 -34 50 -34 c28 0 50 12 50 34 v6 z" fill="#FFFFFF"/>
      <path d="M150 204 v-6 c0 -22 22 -34 50 -34 c28 0 50 12 50 34 v6 z" fill="#F0E3D8" opacity="0.5"/>
      <path d="M150 204 v-6 c0 -22 22 -34 50 -34 c28 0 50 12 50 34 v6 z" fill="#FFFFFF"/>
      <!-- coat collar V -->
      <path d="M200 172 l-16 22 M200 172 l16 22" stroke="#E6D6C8" stroke-width="3" stroke-linecap="round"/>
      <path d="M200 172 l-13 18 l13 8 l13 -8 z" fill="#FFE9DA"/>

      <!-- neck -->
      <path d="M191 162 h18 v10 c0 6 -18 6 -18 0 z" fill="url(#derm-face)"/>
      <path d="M191 168 h18 v4 c0 6 -18 6 -18 0 z" fill="#A9714A" opacity="0.35"/>

      <!-- stethoscope: U-tube hanging on the coat, bell at the bottom -->
      <path d="M188 175 C185 198 215 198 212 175" stroke="#34A878" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <circle cx="200" cy="198" r="6.5" fill="#34A878"/>
      <circle cx="200" cy="198" r="2.6" fill="#FFFFFF" opacity="0.65"/>

      <!-- head -->
      <circle cx="183" cy="146" r="4" fill="url(#derm-face)"/>
      <circle cx="217" cy="146" r="4" fill="url(#derm-face)"/>
      <ellipse cx="200" cy="144" rx="21" ry="23" fill="url(#derm-face)"/>
      <!-- hair -->
      <path d="M179 142 c0 -18 12 -30 21 -30 c9 0 21 12 21 30 c-6 -9 -12 -12 -21 -12 c-9 0 -15 3 -21 12 z" fill="#3A2A1E"/>
    </g>

    <!-- medical cross badge, refined -->
    <circle cx="238" cy="206" r="19" fill="#FFFFFF"/>
    <circle cx="238" cy="206" r="19" fill="#34A878" opacity="0.1"/>
    <path d="M238 197 v18 M229 206 h18" stroke="#34A878" stroke-width="5.5" stroke-linecap="round"/>
  </g>
</svg>
